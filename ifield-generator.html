<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iField — Landing Builder Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #06080f, #010101);
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    padding: 24px;
    position: relative;
  }

  .glow-orb {
    position: fixed;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(20, 100, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
    top: -20vh;
    right: -20vw;
    border-radius: 50%;
    filter: blur(80px);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(12, 18, 28, 0.68);
    backdrop-filter: blur(24px);
    border-radius: 56px;
    border: 0.5px solid rgba(80, 140, 255, 0.25);
    padding: 32px 28px;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-size: 32px;
    background: linear-gradient(135deg, #fff, #7bb2ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 13px;
    background: rgba(60, 130, 255, 0.2);
    padding: 4px 12px;
    border-radius: 40px;
    color: #7bb2ff;
  }

  .free-badge {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
  }

  .sub {
    color: #8e9ab0;
    margin-bottom: 32px;
    border-left: 2px solid #2c6eff;
    padding-left: 14px;
    font-size: 14px;
  }

  .input-group { margin-bottom: 24px; }
  label { display: block; font-size: 12px; text-transform: uppercase; color: #8aa0cf; margin-bottom: 8px; }
  input, textarea {
    width: 100%;
    background: rgba(20, 28, 40, 0.8);
    border: 1px solid rgba(70, 120, 220, 0.4);
    border-radius: 28px;
    padding: 14px 18px;
    color: white;
    font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }

  .image-upload-area {
    background: rgba(20, 28, 40, 0.6);
    border-radius: 28px;
    padding: 16px;
    border: 1px dashed rgba(80, 140, 255, 0.5);
    text-align: center;
    cursor: pointer;
  }
  .image-preview { display: flex; gap: 12px; margin-top: 12px; justify-content: center; }
  .preview-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; }

  .template-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .template-btn {
    flex: 1;
    background: rgba(30, 40, 58, 0.6);
    border: 1px solid rgba(70, 130, 255, 0.4);
    color: #b0c4ff;
    padding: 10px;
    border-radius: 40px;
    cursor: pointer;
    text-align: center;
  }
  .template-btn.active { background: linear-gradient(135deg, #2c6eff, #1a4fcc); color: white; }

  button {
    width: 100%;
    background: linear-gradient(105deg, #fff, #eef5ff);
    border: none;
    border-radius: 44px;
    padding: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
  button:active { transform: scale(0.98); }

  /* Блоки вибору */
  .choice-block {
    margin-top: 24px;
    padding: 20px;
    border-radius: 32px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 215, 0, 0.3);
  }
  .choice-title {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 16px;
  }
  .choice-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .choice-buttons button {
    flex: 1;
    margin-top: 0;
    padding: 14px;
  }
  .btn-unlimit { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
  .btn-premium { background: linear-gradient(135deg, #ffd700, #ffb347); color: #1a1a2e; }

  .limit-warning {
    background: rgba(255, 100, 100, 0.2);
    border: 1px solid rgba(255, 100, 100, 0.5);
    border-radius: 20px;
    padding: 16px;
    text-align: center;
    margin-top: 16px;
  }

  .result-section { margin-top: 40px; display: none; }
  .preview-frame { width: 100%; height: 500px; border: none; border-radius: 24px; background: #05070c; }
  .action-buttons { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
  .action-buttons button { flex: 1; background: rgba(30, 40, 58, 0.9); color: white; margin-top: 0; }

  .status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(60, 126, 255, 0.9);
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    z-index: 1000;
  }

  @media (max-width: 520px) {
    .container { padding: 20px; }
    .preview-frame { height: 450px; }
  }
</style>
</head>
<body>
<div class="glow-orb"></div>

<div class="container">
  <h1>
    ⚡ iField 
    <span class="badge">landing builder</span>
    <span class="badge free-badge" id="freeBadge">3 FREE</span>
  </h1>
  <div class="sub">створи готовий HTML лендінг за 2 хвилини</div>

  <div class="template-selector">
    <button class="template-btn active" onclick="setTemplate('sci-fi')">🎬 Sci-Fi</button>
    <button class="template-btn" onclick="setTemplate('luxury')">💎 Luxury</button>
    <button class="template-btn" onclick="setTemplate('nature')">🌿 Nature</button>
    <button class="template-btn" onclick="setTemplate('neon')">🚀 Neon</button>
  </div>

  <div class="input-group">
    <label>🏷️ Назва бренду</label>
    <input id="brand" placeholder="iField Studio" value="iField Studio">
  </div>
  <div class="input-group">
    <label>🎯 Ніша / сфера</label>
    <input id="niche" placeholder="манікюр, кав'ярня, IT" value="premium manicure">
  </div>
  <div class="input-group">
    <label>✨ Головний оффер</label>
    <input id="product" placeholder="Crystal Shell покриття" value="Crystal Shell">
  </div>
  <div class="input-group">
    <label>📝 Опис</label>
    <textarea id="description">Довговічне покриття до 4 тижнів. Безпечний склад, європейська якість.</textarea>
  </div>
  <div class="input-group">
    <label>🖼️ Фото продукту</label>
    <div class="image-upload-area" onclick="document.getElementById('imageFile').click()">
      📸 Натисни, щоб завантажити фото
      <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
    </div>
    <div class="image-preview" id="imagePreview"></div>
    <input id="imageUrl" placeholder="Або встав URL фото" style="margin-top: 10px;">
  </div>
  <div class="input-group">
    <label>📡 Контакти</label>
    <input id="contact" placeholder="@username" value="@ifield_studio">
  </div>

  <button onclick="generateLanding()">✨ Згенерувати лендінг ✨</button>

  <!-- Блок вибору після ліміту -->
  <div id="choiceBlock" class="choice-block" style="display: none;">
    <div class="choice-title">⚡ Ліміт безкоштовних генерацій вичерпано!</div>
    <div class="choice-buttons">
      <button class="btn-unlimit" onclick="buyUnlimit()">🔥 Безлімітний доступ — $5</button>
      <button class="btn-premium" onclick="buyPremium()">💼 Замовити лендінг під ключ — від $100</button>
    </div>
    <p style="text-align: center; font-size: 12px; margin-top: 12px; color: #888;">
      💡 Безліміт — створюй скільки хочеш сам<br>
      🎯 Під ключ — я зроблю унікальний лендінг за тебе
    </p>
  </div>

  <div class="result-section" id="resultSection">
    <iframe class="preview-frame" id="previewFrame"></iframe>
    <div class="action-buttons">
      <button onclick="downloadLanding()">📥 Завантажити HTML</button>
      <button onclick="copyHTML()">📋 Скопіювати код</button>
      <button onclick="shareLanding()">📱 Поділитись</button>
    </div>
  </div>
</div>

<script>
  // ========== ЛІМІТИ ==========
  let freeGenerations = localStorage.getItem('freeGenerations');
  if (freeGenerations === null) {
    freeGenerations = 3;
    localStorage.setItem('freeGenerations', freeGenerations);
  } else {
    freeGenerations = parseInt(freeGenerations);
  }

  let currentHTML = '';
  let uploadedImageData = '';
  let currentTemplate = 'sci-fi';

  function updateBadge() {
    const badge = document.getElementById('freeBadge');
    if (badge) badge.innerText = `${freeGenerations} FREE`;
    if (freeGenerations <= 0) {
      document.getElementById('choiceBlock').style.display = 'block';
    }
  }

  const templateStyles = {
    'sci-fi': { gradient: 'linear-gradient(135deg, #ffffff, #7bb2ff)', badge: 'rgba(60,130,255,0.2)' },
    'luxury': { gradient: 'linear-gradient(135deg, #FFD700, #FFA500)', badge: 'rgba(255,215,0,0.2)' },
    'nature': { gradient: 'linear-gradient(135deg, #90EE90, #228B22)', badge: 'rgba(144,238,144,0.2)' },
    'neon': { gradient: 'linear-gradient(135deg, #FF00FF, #00FFFF)', badge: 'rgba(255,0,255,0.2)' }
  };

  function setTemplate(template) {
    currentTemplate = template;
    document.querySelectorAll('.template-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    showStatus(`🎨 Шаблон ${template} активовано`);
  }

  function uploadImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        uploadedImageData = e.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${uploadedImageData}" class="preview-img">`;
        document.getElementById('imageUrl').value = '';
        showStatus('✅ Фото завантажено!');
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function getSmartAdvice(niche) {
    const n = niche.toLowerCase();
    if (n.includes('манікюр')) return "💅 Додай фото рук, прайс та кнопку запису.";
    if (n.includes('кава')) return "☕ Темний фон, акцент на атмосферу, додай відгуки.";
    if (n.includes('it') || n.includes('tech')) return "🚀 Темний фон з неоновими акцентами.";
    return "💡 Зроби акцент на 3 головні переваги.";
  }

  function generateLanding() {
    if (freeGenerations <= 0) {
      showStatus('⚠️ Ліміт вичерпано! Обери один з варіантів нижче', true);
      document.getElementById('choiceBlock').style.display = 'block';
      return;
    }

    const brand = document.getElementById('brand').value.trim() || 'iField Studio';
    const niche = document.getElementById('niche').value.trim() || 'вашій ніші';
    const product = document.getElementById('product').value.trim() || 'рішення';
    const description = document.getElementById('description').value.trim() || 'Якісне рішення';
    const contact = document.getElementById('contact').value.trim() || '@contact';
    
    let imageSrc = uploadedImageData || document.getElementById('imageUrl').value.trim();
    if (!imageSrc) imageSrc = 'https://placehold.co/600x400/1a1f2a/7bb2ff?text=Your+Product';

    const style = templateStyles[currentTemplate];
    const advice = getSmartAdvice(niche);

    freeGenerations--;
    localStorage.setItem('freeGenerations', freeGenerations);
    updateBadge();

    currentHTML = `<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${brand} | ${product}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(circle at 20% 30%, #06080f, #010101);font-family:-apple-system,"SF Pro Text",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
.glow-orb{position:fixed;width:70vw;height:70vw;background:radial-gradient(circle,rgba(20,100,255,0.2) 0%,rgba(0,0,0,0) 70%);top:-20vh;right:-20vw;border-radius:50%;filter:blur(80px);animation:pulse 4s infinite}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.container{max-width:720px;width:100%;background:rgba(12,18,28,0.68);backdrop-filter:blur(24px);border-radius:56px;border:0.5px solid rgba(80,140,255,0.3);padding:48px 36px;text-align:center}
.badge{display:inline-block;font-size:12px;background:${style.badge};padding:6px 14px;border-radius:40px;color:#7bb2ff;margin-bottom:24px}
h1{font-size:48px;font-weight:700;background:${style.gradient};-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:12px}
.product{font-size:20px;color:#b0c4ff;margin-bottom:24px}
.product-image{width:100%;max-width:400px;margin:0 auto 32px;border-radius:32px;overflow:hidden}
.product-image img{width:100%;display:block}
.description{color:#9aa8c5;line-height:1.6;margin-bottom:32px}
.features{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:40px}
.feature{background:rgba(255,255,255,0.03);padding:10px 18px;border-radius:40px;font-size:13px;color:#ccd9ff}
.contact-btn{display:inline-block;background:linear-gradient(135deg,#fff,#eef5ff);color:#021a3b;text-decoration:none;padding:16px 32px;border-radius:44px;font-weight:600;font-size:18px}
.footer{margin-top:48px;font-size:12px;color:#5a6a8a}
@media(max-width:520px){.container{padding:32px 24px}h1{font-size:32px}}
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="container">
<div class="badge">⚡ iField Studio • ${niche}</div>
<h1>${brand}</h1>
<div class="product">${product}</div>
<div class="product-image"><img src="${imageSrc}" alt="${product}"></div>
<div class="description">${description}</div>
<div class="features"><div class="feature">✨ мінімалізм</div><div class="feature">⚡ швидкий старт</div><div class="feature">🔮 преміальна якість</div></div>
<a href="${contact.startsWith('@') ? 'https://t.me/' + contact.slice(1) : contact}" class="contact-btn" target="_blank">📩 Зв'язатися зараз</a>
<div class="footer">${contact}</div>
</div>
</body>
</html>`;

    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('previewFrame').srcdoc = currentHTML;
    showStatus(`✅ Лендінг створено! Залишилось ${freeGenerations} безкоштовних\n💡 ${advice}`);
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
  }

  function buyUnlimit() {
    window.open('https://t.me/ifield_lab?text=Хочу+купити+безлімітний+доступ+за+$5', '_blank');
    showStatus('📱 Напишіть @ifield_lab для отримання безліміту');
  }

  function buyPremium() {
    window.open('https://t.me/ifield_lab?text=Хочу+замовити+лендінг+під+ключ', '_blank');
    showStatus('📱 Напишіть @ifield_lab для замовлення преміум лендінгу');
  }

  function downloadLanding() {
    if (!currentHTML) { showStatus('⚠️ Спочатку згенеруй лендінг', true); return; }
    const blob = new Blob([currentHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `landing-${Date.now()}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus('📥 Файл завантажено!');
  }

  async function copyHTML() {
    if (!currentHTML) { showStatus('⚠️ Спочатку згенеруй лендінг', true); return; }
    try {
      await navigator.clipboard.writeText(currentHTML);
      showStatus('📋 Код скопійовано!');
    } catch(err) { showStatus('❌ Помилка копіювання', true); }
  }

  function shareLanding() {
    const url = window.location.href;
    window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Створи%20лендінг%20за%202%20хвилини!`, '_blank');
  }

  function showStatus(msg, isError = false) {
    const existing = document.querySelector('.status');
    if (existing) existing.remove();
    const status = document.createElement('div');
    status.className = 'status';
    status.textContent = msg;
    status.style.background = isError ? 'rgba(255,70,70,0.9)' : 'rgba(60,126,255,0.9)';
    document.body.appendChild(status);
    setTimeout(() => { status.remove(); }, 4000);
  }

  updateBadge();
</script>
</body>
</html>
