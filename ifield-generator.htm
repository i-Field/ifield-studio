<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iField — Landing Builder</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #06080f, #010101);
    font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    padding: 24px;
  }

  /* Контейнер для генератора */
  .builder-container {
    max-width: 800px;
    margin: 0 auto 40px;
    background: rgba(12, 18, 28, 0.68);
    backdrop-filter: blur(24px);
    border-radius: 56px;
    border: 0.5px solid rgba(80, 140, 255, 0.25);
    padding: 32px;
  }

  h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #fff, #7bb2ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }

  .sub {
    color: #8e9ab0;
    margin-bottom: 28px;
    font-size: 14px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    color: #7bb2ff;
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    background: rgba(20, 28, 40, 0.9);
    border: 1px solid rgba(70, 120, 220, 0.4);
    border-radius: 24px;
    padding: 14px 18px;
    color: white;
    font-family: inherit;
    font-size: 15px;
  }

  textarea {
    min-height: 80px;
    resize: vertical;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #3c7eff;
  }

  button {
    background: linear-gradient(135deg, #fff, #eef5ff);
    border: none;
    border-radius: 40px;
    padding: 14px 24px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
  }

  .preview-area {
    max-width: 800px;
    margin: 0 auto;
  }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .preview-header span {
    color: #7bb2ff;
    font-size: 12px;
    text-transform: uppercase;
  }

  .landing-preview {
    background: #0a0c12;
    border-radius: 32px;
    border: 1px solid rgba(80, 140, 255, 0.3);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .preview-frame {
    width: 100%;
    height: 500px;
    border: none;
    background: #05070c;
  }

  .action-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .action-buttons button {
    flex: 1;
    background: rgba(30, 40, 58, 0.9);
    color: white;
    border: 1px solid rgba(70, 130, 255, 0.5);
    margin-top: 0;
  }

  .action-buttons button:first-child {
    background: linear-gradient(135deg, #2c6eff, #1a4fcc);
    border: none;
  }

  .status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(60, 126, 255, 0.9);
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    z-index: 1000;
  }
</style>
</head>
<body>

<div class="builder-container">
  <h1>⚡ iField Landing Builder</h1>
  <div class="sub">створи готовий HTML-лендінг за 1 хвилину</div>

  <div class="input-group">
    <label>🏷️ Назва бренду / компанії</label>
    <input id="brand" placeholder="Наприклад: iField Studio" value="iField Studio">
  </div>

  <div class="input-group">
    <label>🎯 Ніша / сфера</label>
    <input id="niche" placeholder="Наприклад: преміальний манікюр" value="premium manicure">
  </div>

  <div class="input-group">
    <label>✨ Головний оффер (що продаєш)</label>
    <input id="product" placeholder="Наприклад: Crystal Shell покриття" value="Crystal Shell Coating">
  </div>

  <div class="input-group">
    <label>📝 Опис (коротко про переваги)</label>
    <textarea id="description" placeholder="Напиши 2-3 речення про переваги...">Довговічне покриття, яке тримається до 4 тижнів. Безпечний склад, європейська якість.</textarea>
  </div>

  <div class="input-group">
    <label>📡 Контакти (Telegram, Instagram, телефон)</label>
    <input id="contact" placeholder="@username або посилання" value="@ifield_studio">
  </div>

  <button onclick="generateLanding()">✨ Згенерувати готовий лендінг ✨</button>
</div>

<div class="preview-area" id="previewArea" style="display: none;">
  <div class="preview-header">
    <span>◈ ПРЕВ'Ю ЗГЕНЕРОВАНОГО ЛЕНДІНГУ ◈</span>
    <span>↓ скроль ↓</span>
  </div>
  <div class="landing-preview">
    <iframe class="preview-frame" id="previewFrame"></iframe>
  </div>
  <div class="action-buttons">
    <button onclick="downloadLanding()">📥 Завантажити HTML файл</button>
    <button onclick="copyHTML()">📋 Скопіювати код</button>
  </div>
</div>

<script>
  let currentHTML = '';

  function generateLanding() {
    const brand = document.getElementById('brand').value.trim() || 'iField Studio';
    const niche = document.getElementById('niche').value.trim() || 'вашій ніші';
    const product = document.getElementById('product').value.trim() || 'рішення';
    const description = document.getElementById('description').value.trim() || 'Якісне рішення для вашого бізнесу';
    const contact = document.getElementById('contact').value.trim() || '@contact';

    // Генеруємо повноцінний HTML лендінг
    currentHTML = `<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>${brand} | ${product}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #06080f, #010101);
      font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(30, 140, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(30, 140, 255, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .glow-orb {
      position: fixed;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(20, 100, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: -20vh;
      right: -20vw;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
    }

    .container {
      max-width: 680px;
      width: 100%;
      background: rgba(12, 18, 28, 0.68);
      backdrop-filter: blur(24px);
      border-radius: 56px;
      border: 0.5px solid rgba(80, 140, 255, 0.25);
      padding: 48px 36px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      background: rgba(60, 130, 255, 0.2);
      padding: 6px 14px;
      border-radius: 40px;
      color: #7bb2ff;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #7bb2ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .product {
      font-size: 20px;
      color: #b0c4ff;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .description {
      color: #9aa8c5;
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 17px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .feature {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 14px;
      color: #ccd9ff;
      border: 0.5px solid rgba(80, 140, 255, 0.3);
    }

    .contact-btn {
      display: inline-block;
      background: linear-gradient(135deg, #ffffff, #eef5ff);
      color: #021a3b;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 44px;
      font-weight: 600;
      font-size: 18px;
      margin-top: 16px;
      transition: transform 0.2s;
    }

    .contact-btn:active {
      transform: scale(0.97);
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #5a6a8a;
    }

    @media (max-width: 520px) {
      .container {
        padding: 32px 24px;
      }
      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
<div class="glow-orb"></div>
<div class="container">
  <div class="badge">⚡ signature edition</div>
  <h1>${brand}</h1>
  <div class="product">${product}</div>
  <div class="description">${description}</div>
  <div class="features">
    <div class="feature">✨ мінімалізм</div>
    <div class="feature">⚡ фокус на результат</div>
    <div class="feature">🔮 преміальна якість</div>
  </div>
  <a href="${contact.startsWith('@') ? 'https://t.me/' + contact.slice(1) : contact.startsWith('http') ? contact : 'https://t.me/' + contact}" class="contact-btn" target="_blank">
    📩 Зв'язатися зараз
  </a>
  <div class="footer">${contact}</div>
</div>
</body>
</html>`;

    // Показуємо прев'ю
    const previewArea = document.getElementById('previewArea');
    previewArea.style.display = 'block';
    
    const iframe = document.getElementById('previewFrame');
    iframe.srcdoc = currentHTML;
    
    showStatus('✅ Лендінг згенеровано!');
    
    // Скролимо до прев'ю
    previewArea.scrollIntoView({ behavior: 'smooth' });
  }

  function downloadLanding() {
    if (!currentHTML) {
      showStatus('⚠️ Спочатку згенеруй лендінг', true);
      return;
    }
    
    const blob = new Blob([currentHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `landing-${Date.now()}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showStatus('📥 Файл завантажено!');
  }

  async function copyHTML() {
    if (!currentHTML) {
      showStatus('⚠️ Спочатку згенеруй лендінг', true);
      return;
    }
    
    try {
      await navigator.clipboard.writeText(currentHTML);
      showStatus('📋 HTML код скопійовано!');
    } catch (err) {
      showStatus('❌ Не вдалося скопіювати', true);
    }
  }

  function showStatus(msg, isError = false) {
    const existing = document.querySelector('.status');
    if (existing) existing.remove();
    
    const status = document.createElement('div');
    status.className = 'status';
    status.textContent = msg;
    status.style.background = isError ? 'rgba(255, 70, 70, 0.9)' : 'rgba(60, 126, 255, 0.9)';
    document.body.appendChild(status);
    
    setTimeout(() => {
      status.style.opacity = '0';
      setTimeout(() => status.remove(), 300);
    }, 2500);
  }
</script>
</body>
</html>
