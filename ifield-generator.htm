<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>iField Generator — Neural Landing Studio</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #06080f, #010101);
    font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(30, 140, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 140, 255, 0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(20, 100, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
    top: -20vh;
    right: -20vw;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb-bottom {
    position: fixed;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(80, 70, 255, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
    bottom: -30vh;
    left: -20vw;
    filter: blur(90px);
    pointer-events: none;
  }

  .container {
    max-width: 720px;
    width: 100%;
    background: rgba(12, 18, 28, 0.68);
    backdrop-filter: blur(24px);
    border-radius: 56px;
    border: 0.5px solid rgba(80, 140, 255, 0.25);
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
    padding: 32px 28px 40px;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-size: 32px;
    font-weight: 590;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #b0cbff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 13px;
    font-weight: 500;
    background: rgba(60, 130, 255, 0.2);
    backdrop-filter: blur(4px);
    padding: 4px 12px;
    border-radius: 40px;
    color: #7bb2ff;
    border: 0.3px solid rgba(100, 160, 255, 0.5);
  }

  .sub {
    color: #8e9ab0;
    font-size: 15px;
    margin-bottom: 32px;
    border-left: 2px solid #2c6eff;
    padding-left: 14px;
  }

  .input-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    color: #8aa0cf;
    margin-bottom: 8px;
    margin-left: 4px;
  }

  input {
    width: 100%;
    background: rgba(20, 28, 40, 0.8);
    border: 1px solid rgba(70, 120, 220, 0.4);
    border-radius: 28px;
    padding: 16px 20px;
    font-size: 17px;
    color: #ffffff;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  input:focus {
    outline: none;
    border-color: #3c7eff;
    box-shadow: 0 0 0 3px rgba(60, 126, 255, 0.3);
    background: rgba(16, 24, 38, 0.95);
  }

  input::placeholder {
    color: #4f5a78;
  }

  button {
    width: 100%;
    background: linear-gradient(105deg, #ffffff 0%, #eef5ff 100%);
    border: none;
    border-radius: 44px;
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 590;
    font-family: inherit;
    color: #021a3b;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  button:active {
    transform: scale(0.98);
  }

  .result-section {
    margin-top: 40px;
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .result-header span {
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    background: rgba(70, 130, 255, 0.2);
    padding: 4px 10px;
    border-radius: 40px;
    color: #98bbff;
  }

  .result {
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(16px);
    border-radius: 36px;
    padding: 24px;
    border: 0.5px solid rgba(80, 150, 255, 0.3);
    white-space: pre-wrap;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 14px;
    line-height: 1.55;
    color: #eef3ff;
    max-height: 500px;
    overflow-y: auto;
  }

  .copy {
    margin-top: 16px;
    background: rgba(30, 40, 58, 0.9);
    color: #cddcff;
    border: 0.5px solid rgba(70, 130, 255, 0.6);
    box-shadow: none;
  }

  .status-message {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(60, 126, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    z-index: 1000;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .container {
      padding: 24px 20px;
    }
    h1 {
      font-size: 26px;
    }
  }

  @supports (padding: max(0px)) {
    .container {
      padding-left: max(28px, env(safe-area-inset-left));
      padding-right: max(28px, env(safe-area-inset-right));
      padding-top: max(24px, env(safe-area-inset-top));
    }
  }
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="glow-orb-bottom"></div>

<div class="container">
  <h1>⚡ iField <span class="badge">neural forge</span></h1>
  <div class="sub">одним імпульсом — landing з майбутнього</div>

  <div class="input-group">
    <label>🎯 ніша / сфера</label>
    <input id="niche" placeholder="Наприклад: преміальний манікюр, AI-консалтинг" value="premium manicure studio">
  </div>

  <div class="input-group">
    <label>✨ продукт / послуга</label>
    <input id="product" placeholder="Що продаєш?" value="Crystal Shell coating">
  </div>

  <div class="input-group">
    <label>📡 контактний канал</label>
    <input id="contact" placeholder="Telegram, Instagram" value="@ifield_studio">
  </div>

  <button onclick="generateLanding()">
    <span>✨</span> Згенерувати лендінг <span>⚡</span>
  </button>

  <div class="result-section">
    <div class="result-header">
      <span>◈ OUTCOME ◈</span>
      <span style="font-size: 10px;">ready-to-copy</span>
    </div>
    <div class="result" id="result">// ваш sci-fi лендінг з'явиться тут</div>
    <button class="copy" onclick="copyToClipboard()">⎘ скопіювати текст</button>
  </div>
</div>

<script>
  function showStatusMessage(message, isError = false) {
    const existingMsg = document.querySelector('.status-message');
    if(existingMsg) existingMsg.remove();
    
    const msg = document.createElement('div');
    msg.className = 'status-message';
    msg.textContent = message;
    msg.style.background = isError ? 'rgba(255, 70, 70, 0.9)' : 'rgba(60, 126, 255, 0.9)';
    document.body.appendChild(msg);
    
    setTimeout(() => {
      msg.style.opacity = '0';
      setTimeout(() => msg.remove(), 300);
    }, 2000);
  }

  function generateLanding() {
    let niche = document.getElementById("niche").value.trim();
    let product = document.getElementById("product").value.trim();
    let contact = document.getElementById("contact").value.trim();

    if (niche === "") niche = "вашій ніші";
    if (product === "") product = "рішення";
    if (contact === "") contact = "@ваш_контакт";

    const sciFiCopy = `
    █ ▌${product.toUpperCase()}  •  SIGNATURE EDITION  ▌ █

    ${product} для сфери ${niche.toLowerCase()}
    
    Архітектура простоти. Потужність фокусу.
    
    Це не просто лендінг — це інтерфейс довіри.
    Мінімалістична конструкція, що працює як 
    високоточний механізм: без шуму, без зайвих 
    елементів, лише чіткий сигнал до дії.
    
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    
    Що інтегровано в систему:
    
    • Миттєве залучення — перший кадр вирішує все
    • Адаптивна матриця тексту під ваш оффер
    • Архітектура конверсії: структура > дизайн
    • Вбудований механізм "одного дотику"
    
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    
    Чому це працює на рівні нейромережі:
    
    — Відсутність інформаційного шуму
    — Фокус на цінність, а не на візуальні ефекти
    — Готовність до масштабування
    — Прозорий зв'язок з клієнтом
    
    ⚡️ АКТИВАЦІЯ ⚡️
    
    📡 канал зв'язку: ${contact}
    
    👉 Один клік відділяє вас від наступного рівня.
    Напишіть зараз — система відповідає миттєво.
    `;

    document.getElementById("result").innerText = sciFiCopy;
    showStatusMessage('✅ Лендінг згенеровано!');
  }

  async function copyToClipboard() {
    const resultText = document.getElementById("result").innerText;
    if (!resultText || resultText === "// ваш sci-fi лендінг з'явиться тут") {
      showStatusMessage('⚠️ Спочатку згенеруйте landing', true);
      return;
    }
    
    try {
      await navigator.clipboard.writeText(resultText);
      const copyBtn = document.querySelector('.copy');
      const originalText = copyBtn.innerHTML;
      copyBtn.innerHTML = '✓ скопійовано!';
      showStatusMessage('📋 Текст скопійовано');
      setTimeout(() => {
        copyBtn.innerHTML = originalText;
      }, 1800);
    } catch (err) {
      showStatusMessage('❌ Не вдалося скопіювати', true);
    }
  }

  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') generateLanding();
    });
  });

  window.addEventListener('DOMContentLoaded', () => {
    generateLanding();
  });
</script>
</body>
</html>
