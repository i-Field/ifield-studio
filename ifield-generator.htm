<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iField — Neural Landing Studio</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #06080f, #010101);
    font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(30, 140, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 140, 255, 0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(20, 100, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
    top: -20vh;
    right: -20vw;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }

  .glow-orb-bottom {
    position: fixed;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(80, 70, 255, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
    bottom: -30vh;
    left: -20vw;
    filter: blur(90px);
    pointer-events: none;
    animation: pulse 5s ease-in-out infinite reverse;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto 40px;
    background: rgba(12, 18, 28, 0.68);
    backdrop-filter: blur(24px);
    border-radius: 56px;
    border: 0.5px solid rgba(80, 140, 255, 0.25);
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
    padding: 32px 28px 40px;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-size: 32px;
    font-weight: 590;
    background: linear-gradient(135deg, #ffffff, #b0cbff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 13px;
    font-weight: 500;
    background: rgba(60, 130, 255, 0.2);
    backdrop-filter: blur(4px);
    padding: 4px 12px;
    border-radius: 40px;
    color: #7bb2ff;
    border: 0.3px solid rgba(100, 160, 255, 0.5);
  }

  .premium-badge {
    background: linear-gradient(135deg, #ffd700, #ffb347);
    color: #1a1a2e;
    font-size: 11px;
    padding: 4px 12px;
    margin-left: 10px;
  }

  .sub {
    color: #8e9ab0;
    font-size: 15px;
    margin-bottom: 32px;
    border-left: 2px solid #2c6eff;
    padding-left: 14px;
  }

  .input-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    color: #8aa0cf;
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: rgba(20, 28, 40, 0.8);
    border: 1px solid rgba(70, 120, 220, 0.4);
    border-radius: 28px;
    padding: 16px 20px;
    font-size: 17px;
    color: #ffffff;
    font-family: inherit;
    transition: all 0.2s;
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #3c7eff;
    box-shadow: 0 0 0 3px rgba(60, 126, 255, 0.3);
  }

  .image-upload-area {
    background: rgba(20, 28, 40, 0.6);
    border-radius: 28px;
    padding: 20px;
    border: 1px dashed rgba(80, 140, 255, 0.5);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .image-upload-area:hover {
    background: rgba(40, 60, 100, 0.4);
    border-color: #3c7eff;
  }

  .image-preview {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
    justify-content: center;
  }

  .preview-img {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    object-fit: cover;
    border: 2px solid rgba(80, 140, 255, 0.5);
  }

  .template-selector {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .template-btn {
    flex: 1;
    background: rgba(30, 40, 58, 0.6);
    border: 1px solid rgba(70, 130, 255, 0.4);
    color: #b0c4ff;
    font-size: 13px;
    padding: 10px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .template-btn.active {
    background: linear-gradient(135deg, #2c6eff, #1a4fcc);
    color: white;
    border-color: transparent;
  }

  button {
    width: 100%;
    background: linear-gradient(105deg, #ffffff 0%, #eef5ff 100%);
    border: none;
    border-radius: 44px;
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 590;
    cursor: pointer;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.25s;
  }

  button:active { transform: scale(0.98); }

  .limit-warning {
    background: rgba(255, 100, 100, 0.2);
    border: 1px solid rgba(255, 100, 100, 0.5);
    border-radius: 20px;
    padding: 12px;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
  }

  .result-section {
    margin-top: 40px;
    display: none;
  }

  .preview-frame-container {
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(16px);
    border-radius: 36px;
    padding: 20px;
    border: 0.5px solid rgba(80, 150, 255, 0.3);
    margin-bottom: 20px;
  }

  .preview-frame {
    width: 100%;
    height: 550px;
    border: none;
    border-radius: 24px;
    background: #05070c;
  }

  .action-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .action-buttons button {
    flex: 1;
    background: rgba(30, 40, 58, 0.9);
    color: #cddcff;
    border: 0.5px solid rgba(70, 130, 255, 0.6);
    margin-top: 0;
  }

  .action-buttons button:first-child {
    background: linear-gradient(135deg, #2c6eff, #1a4fcc);
    color: white;
  }

  .status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(60, 126, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 40px;
    color: white;
    font-size: 14px;
    z-index: 1000;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .container { padding: 24px 20px; }
    h1 { font-size: 26px; }
    .preview-frame { height: 450px; }
  }
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="glow-orb-bottom"></div>

<div class="container">
  <h1>
    ⚡ iField 
    <span class="badge">neural forge</span>
    <span class="badge premium-badge">3 FREE</span>
  </h1>
  <div class="sub">одним імпульсом — готовий HTML лендінг з візуалом</div>

  <div class="template-selector">
    <button class="template-btn active" onclick="setTemplate('sci-fi')">🎬 Sci-Fi</button>
    <button class="template-btn" onclick="setTemplate('luxury')">💎 Luxury</button>
    <button class="template-btn" onclick="setTemplate('nature')">🌿 Nature</button>
    <button class="template-btn" onclick="setTemplate('neon')">🚀 Neon</button>
  </div>

  <div class="input-group">
    <label>🏷️ Назва бренду</label>
    <input id="brand" placeholder="iField Studio" value="iField Studio">
  </div>

  <div class="input-group">
    <label>🎯 Ніша / сфера</label>
    <input id="niche" placeholder="манікюр, кав'ярня, IT" value="premium manicure">
  </div>

  <div class="input-group">
    <label>✨ Головний оффер</label>
    <input id="product" placeholder="Crystal Shell покриття" value="Crystal Shell">
  </div>

  <div class="input-group">
    <label>📝 Опис</label>
    <textarea id="description">Довговічне покриття до 4 тижнів. Безпечний склад, європейська якість.</textarea>
  </div>

  <div class="input-group">
    <label>🖼️ Фото продукту</label>
    <div class="image-upload-area" onclick="document.getElementById('imageFile').click()">
      📸 Натисни, щоб завантажити фото
      <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
    </div>
    <div class="image-preview" id="imagePreview"></div>
    <input id="imageUrl" placeholder="Або встав URL фото" style="margin-top: 10px;">
  </div>

  <div class="input-group">
    <label>📡 Контакти</label>
    <input id="contact" placeholder="@username" value="@ifield_studio">
  </div>

  <button onclick="generateLanding()">✨ Згенерувати лендінг ✨</button>

  <div id="limitWarning" class="limit-warning" style="display: none;">
    ⚡ У вас залишилось <span id="remainingCount">3</span> безкоштовних генерацій<br>
    🔓 <a href="#" onclick="unlockPremium()" style="color: #ffd700;">Розблокувати безліміт →</a>
  </div>

  <div class="result-section" id="resultSection">
    <div class="preview-frame-container">
      <iframe class="preview-frame" id="previewFrame"></iframe>
    </div>
    <div class="action-buttons">
      <button onclick="downloadLanding()">📥 Завантажити HTML</button>
      <button onclick="copyHTML()">📋 Скопіювати код</button>
      <button onclick="shareToTelegram()">📱 Поділитись</button>
    </div>
  </div>
</div>

<script>
  // ========== ЛІМІТИ ==========
  let freeGenerations = localStorage.getItem('freeGenerations');
  if (freeGenerations === null) {
    freeGenerations = 3;
    localStorage.setItem('freeGenerations', freeGenerations);
  } else {
    freeGenerations = parseInt(freeGenerations);
  }

  let currentHTML = '';
  let uploadedImageData = '';
  let currentTemplate = 'sci-fi';

  const templateStyles = {
    'sci-fi': { gradient: 'linear-gradient(135deg, #ffffff, #7bb2ff)', badge: 'rgba(60,130,255,0.2)', accent: '#2c6eff' },
    'luxury': { gradient: 'linear-gradient(135deg, #FFD700, #FFA500)', badge: 'rgba(255,215,0,0.2)', accent: '#FFD700' },
    'nature': { gradient: 'linear-gradient(135deg, #90EE90, #228B22)', badge: 'rgba(144,238,144,0.2)', accent: '#6B8E23' },
    'neon': { gradient: 'linear-gradient(135deg, #FF00FF, #00FFFF)', badge: 'rgba(255,0,255,0.2)', accent: '#FF00FF' }
  };

  function setTemplate(template) {
    currentTemplate = template;
    document.querySelectorAll('.template-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    showStatus(`🎨 Шаблон ${template} активовано`);
  }

  function uploadImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        uploadedImageData = e.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${uploadedImageData}" class="preview-img">`;
        document.getElementById('imageUrl').value = '';
        showStatus('✅ Фото завантажено!');
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  // ========== ПСЕВДО AI — РОЗУМНІ ПОРАДИ ==========
  function getSmartAdvice(niche, product) {
    const n = niche.toLowerCase();
    
    if (n.includes('манікюр') || n.includes('nail') || n.includes('beauty')) {
      return "💅 Порада: додай фото рук з покриттям, прайс на послуги та кнопку запису. Рожево-золота гама працює найкраще.";
    }
    if (n.includes('кава') || n.includes('coffee')) {
      return "☕ Порада: темний фон, акцент на атмосферу, додай відгуки постійних клієнтів.";
    }
    if (n.includes('it') || n.includes('tech') || n.includes('ai')) {
      return "🚀 Порада: темний фон з неоновими акцентами (синій, фіолетовий). Додай анімацію на кнопку.";
    }
    if (n.includes('фітнес') || n.includes('fitness')) {
      return "💪 Порада: яскраві фото, акцент на результат, додай таймер акції.";
    }
    return "💡 Порада: зроби акцент на 3 головні переваги. Додай відгуки клієнтів. Кнопка має бути яскравою.";
  }

  function generateLanding() {
    if (freeGenerations <= 0) {
      showStatus('⚠️ Ліміт вичерпано! Напишіть @ifield_lab для розблокування', true);
      document.getElementById('limitWarning').style.display = 'block';
      return;
    }

    const brand = document.getElementById('brand').value.trim() || 'iField Studio';
    const niche = document.getElementById('niche').value.trim() || 'вашій ніші';
    const product = document.getElementById('product').value.trim() || 'рішення';
    const description = document.getElementById('description').value.trim() || 'Якісне рішення';
    const contact = document.getElementById('contact').value.trim() || '@contact';
    
    let imageSrc = uploadedImageData || document.getElementById('imageUrl').value.trim();
    if (!imageSrc) imageSrc = 'https://placehold.co/600x400/1a1f2a/7bb2ff?text=Your+Product';

    const style = templateStyles[currentTemplate];
    const advice = getSmartAdvice(niche, product);

    freeGenerations--;
    localStorage.setItem('freeGenerations', freeGenerations);
    updateLimitDisplay();

    currentHTML = `<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>${brand} | ${product}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(circle at 20% 30%, #06080f, #010101);font-family:-apple-system,"SF Pro Text","SF Pro Display",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
.glow-orb{position:fixed;width:70vw;height:70vw;background:radial-gradient(circle,rgba(20,100,255,0.2) 0%,rgba(0,0,0,0) 70%);top:-20vh;right:-20vw;border-radius:50%;filter:blur(80px);animation:pulse 4s infinite}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.container{max-width:720px;width:100%;background:rgba(12,18,28,0.68);backdrop-filter:blur(24px);border-radius:56px;border:0.5px solid rgba(80,140,255,0.3);padding:48px 36px;text-align:center;animation:fadeInUp 0.6s}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;font-size:12px;background:${style.badge};padding:6px 14px;border-radius:40px;color:#7bb2ff;margin-bottom:24px}
h1{font-size:48px;font-weight:700;background:${style.gradient};-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:12px}
.product{font-size:20px;color:#b0c4ff;margin-bottom:24px}
.product-image{width:100%;max-width:400px;margin:0 auto 32px;border-radius:32px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.product-image img{width:100%;display:block}
.description{color:#9aa8c5;line-height:1.6;margin-bottom:32px}
.features{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:40px}
.feature{background:rgba(255,255,255,0.03);padding:10px 18px;border-radius:40px;font-size:13px;color:#ccd9ff;border:0.5px solid rgba(80,140,255,0.3)}
.contact-btn{display:inline-block;background:linear-gradient(135deg,#fff,#eef5ff);color:#021a3b;text-decoration:none;padding:16px 32px;border-radius:44px;font-weight:600;font-size:18px;transition:transform 0.2s}
.contact-btn:active{transform:scale(0.97)}
.footer{margin-top:48px;font-size:12px;color:#5a6a8a}
@media(max-width:520px){.container{padding:32px 24px}h1{font-size:32px}}
</style>
</head>
<body>
<div class="glow-orb"></div>
<div class="container">
<div class="badge">⚡ signature edition • ${niche}</div>
<h1>${brand}</h1>
<div class="product">${product}</div>
<div class="product-image"><img src="${imageSrc}" alt="${product}"></div>
<div class="description">${description}</div>
<div class="features"><div class="feature">✨ мінімалізм</div><div class="feature">⚡ фокус на результат</div><div class="feature">🔮 преміальна якість</div></div>
<a href="${contact.startsWith('@') ? 'https://t.me/' + contact.slice(1) : contact}" class="contact-btn" target="_blank">📩 Зв'язатися зараз</a>
<div class="footer">${contact}</div>
</div>
</body>
</html>`;

    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('previewFrame').srcdoc = currentHTML;
    showStatus(`✅ Лендінг створено! Залишилось ${freeGenerations} генерацій\n💡 ${advice}`);
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
  }

  function updateLimitDisplay() {
    const warning = document.getElementById('limitWarning');
    const remainingSpan = document.getElementById('remainingCount');
    if (remainingSpan) remainingSpan.innerText = freeGenerations;
    if (freeGenerations <= 1) warning.style.display = 'block';
    else warning.style.display = 'none';
  }

  function unlockPremium() {
    window.open('https://t.me/ifield_lab', '_blank');
    showStatus('📱 Напишіть @ifield_lab для отримання безлімітного доступу');
  }

  function downloadLanding() {
    if (!currentHTML) { showStatus('⚠️ Спочатку згенеруй лендінг', true); return; }
    const blob = new Blob([currentHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `landing-${Date.now()}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus('📥 Файл завантажено!');
  }

  async function copyHTML() {
    if (!currentHTML) { showStatus('⚠️ Спочатку згенеруй лендінг', true); return; }
    try {
      await navigator.clipboard.writeText(currentHTML);
      showStatus('📋 HTML код скопійовано!');
    } catch(err) { showStatus('❌ Не вдалося скопіювати', true); }
  }

  function shareToTelegram() {
    const brand = document.getElementById('brand').value.trim() || 'iField';
    const url = window.location.href;
    const text = `🔥 ${brand} — створи свій Sci-Fi лендінг!`;
    window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
  }

  function showStatus(msg, isError = false) {
    const existing = document.querySelector('.status');
    if (existing) existing.remove();
    const status = document.createElement('div');
    status.className = 'status';
    status.textContent = msg;
    status.style.background = isError ? 'rgba(255,70,70,0.9)' : 'rgba(60,126,255,0.9)';
    document.body.appendChild(status);
    setTimeout(() => { status.style.opacity = '0'; setTimeout(() => status.remove(), 4000); }, 4000);
  }

  updateLimitDisplay();
</script>
</body>
</html>
